id: 3
title: Peak intensity along the trip
description: Maximum rainfall value experienced along a trajectory line.
placeholders:
  - type: "TRAJECTORY"
    keyword: "{{TRAJECTORY_PLACEHOLDER}}"
query: |
  for $c in (DWD_5min_4326)
  return max(
    clip(
      $c,
      {{TRAJECTORY_PLACEHOLDER}},
      "http://localhost:8080/def/crs/EPSG/0/4326"
    )
