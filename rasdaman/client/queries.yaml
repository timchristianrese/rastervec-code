---

id: 4
title: Trip-level join (many trajectories)
description: Rainfall per trip (multiple trips at once).
placeholders:
  - type: "TRAJECTORY_LIST"
    keyword: "{{TRAJECTORY_LIST_ITEMS}}"
    template: |
      trip_{index}: avg(
        clip($c,
          {trajectory},
          "http://localhost:8080/def/crs/EPSG/0/4326"
        )
      )
query: |
  for $c in (DWD_5min_4326)
  return encode(
    {
      {{TRAJECTORY_LIST_ITEMS}}
    },
    "json"
  )

---

id: 5
title: Raster-mask intersection
description: Which parts of the trip are inside rain > 0.5 mm/h?
placeholders:
  - type: "TRAJECTORY"
    keyword: "{{TRAJECTORY_PLACEHOLDER}}"
query: |
  for $c in (DWD_5min_4326)
  return encode(
    (clip(
      $c,
      {{TRAJECTORY_PLACEHOLDER}},
      "http://localhost:8080/def/crs/EPSG/0/4326"
    )) > 0.5,
    "json"
  )

---

id: 6
title: Fraction of trip above threshold
description: Fraction (ratio) of trajectory samples with rainfall > 0.5 mm/h.
placeholders:
  - type: "TRAJECTORY"
    keyword: "{{TRAJECTORY_PLACEHOLDER}}"
query: |
  for $c in (DWD_5min_4326)
  return
    count( (clip($c, {{TRAJECTORY_PLACEHOLDER}}, "http://localhost:8080/def/crs/EPSG/0/4326")) > 0.5 )
    /
    count( (clip($c, {{TRAJECTORY_PLACEHOLDER}}, "http://localhost:8080/def/crs/EPSG/0/4326") >= 0)
          OR
          (clip($c, {{TRAJECTORY_PLACEHOLDER}}, "http://localhost:8080/def/crs/EPSG/0/4326") < 0)
        )
