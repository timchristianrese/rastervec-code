- name: Load SimRa data on Clients and Manager
  hosts: rasdaman_client, odc_client, manager
  become: true
  tasks:
    - name: Copy SimRa import script
      copy:
        src: ../../data/simra/import.sh
        dest: /home/ubuntu/simra-import.sh
        mode: '0755'

    - name: Execute SimRa import
      shell: /home/ubuntu/simra-import.sh
      args:
        executable: /bin/bash

- name: Load DWD data on SUTs
  hosts: rasdaman_sut, odc_sut
  become: true
  tasks:
    - name: Copy DWD import script
      copy:
        src: ../../data/dwd/import.sh
        dest: /home/ubuntu/dwd-import.sh
        mode: '0755'

    - name: Install pigz
      apt:
        name: pigz
        state: present
        update_cache: yes

    - name: Execute DWD import
      shell: /home/ubuntu/dwd-import.sh
      args:
        executable: /bin/bash

